<a href="{{ include.link }}" style="text-decoration: none;">
  <div style="border-radius: 8px; overflow: hidden; transition: transform 0.3s ease;">
    <img src="{{ include.image }}" alt="{{ include.title }}" style="width: 100%; display: block;">
    <div style="padding: 15px; background: #d0d5d2; border-top: 2px solid #5a8a70;">
      <h3 style="margin: 0; color: #1a1a1a;">{{ include.title }}</h3>
      <p style="margin: 5px 0 0 0; color: #3d3d3d; font-size: 0.9em;">{{ include.role }}</p>
    </div>
  </div>
</a>
